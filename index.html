        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4ec 100%);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---------- HOMEPAGE SECTION ---------- */
        .homepage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #ffd9e8, #ffc0d4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 1.2s;
            opacity: 1;
            visibility: visible;
            backdrop-filter: blur(2px);
        }

        .homepage.fade-out {
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 0s linear 1s;
        }

        .hero-card {
            max-width: 700px;
            width: 90%;
            background: rgba(255, 245, 250, 0.92);
            backdrop-filter: blur(18px);
            border-radius: 3rem;
            padding: 2.2rem 2rem;
            text-align: center;
            border: 2px solid rgba(255, 200, 220, 0.95);
            box-shadow: 0 40px 60px rgba(255, 105, 180, 0.3);
            transform: scale(0.96);
            animation: floatIn 0.9s ease-out forwards;
            transition: transform 0.3s;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .hero-card h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #d14781, #ff69b4, #ff9bc2);
            -webkit-background-clip: text;

            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .hero-card .subhead {
            color: #b13e6b;
            font-size: 1.1rem;
            border-top: 2px dashed #ffb7c5;
            border-bottom: 2px dashed #ffb7c5;
            display: inline-block;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            font-weight: 500;
        }

        .hero-bio {
            color: #a13e63;
            margin: 1.2rem 0;
            line-height: 1.5;
            font-size: 0.98rem;
        }

        .enter-btn {

            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 3rem;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;

            transition: all 0.25s ease;
            margin-top: 0.8rem;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .enter-btn:hover {

            background: linear-gradient(95deg, #ff69b4, #e8437c);
            box-shadow: 0 12px 24px rgba(255, 80, 140, 0.5);
        }

        .floating-petal {
            position: absolute;
            pointer-events: none;
            opacity: 0.6;

            font-size: 1.4rem;
        }

    // Particle effect
    function createPinkParticle(x, y) {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = '8px';
        particle.style.height = '8px';
        particle.style.background = '#ff99bb';
        particle.style.borderRadius = '50%';
        particle.style.pointerEvents = 'none';
        particle.style.left = (x - 4) + 'px';
        particle.style.top = (y - 4) + 'px';
        particle.style.zIndex = '9999';
        particle.style.boxShadow = '0 0 10px #ff69b4';
        document.body.appendChild(particle);
        let opacity = 1;
        let scale = 1;
        const interval = setInterval(() => {
            if (opacity <= 0) {
                clearInterval(interval);
                particle.remove();
                return;
            }
            opacity -= 0.05;
            scale += 0.2;
            particle.style.opacity = opacity;
            particle.style.transform = `scale(${scale})`;
        }, 20);
        setTimeout(() => {
            clearInterval(interval);
            if(particle) particle.remove();
        }, 400);
    }

            <button class="modal-close-pink" id="dynamicCloseBtn">close ✨</button>
        `;
        modal.classList.add('active');
        activeModal = modal;
        const closeBtn = document.getElementById('dynamicCloseBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeZoomModal();
            });
        }
    }

    function closeZoomModal() {
        if (activeModal) {
            activeModal.classList.remove('active');
            activeModal = null;
        }
    }

    // Attach tile events after homepage transition
    function bindTileEvents() {
        const allTiles = document.querySelectorAll('.pink-tile');
        allTiles.forEach(tile => {
            // remove old listeners to avoid duplicates
            tile.removeEventListener('click', tileClickHandler);
            tile.addEventListener('click', tileClickHandler);
        });
    }

    function tileClickHandler(e) {
        e.stopPropagation();
        let tile = e.currentTarget;
        let tileId = tile.getAttribute('data-id');
        if (!tileId) {
            const txt = tile.innerText.toLowerCase();
            if (txt.includes('logo')) tileId = 'logo';
            else if (txt.includes('about')) tileId = 'about';
            else if (txt.includes('contact')) tileId = 'contact';
            else if (txt.includes('goals')) tileId = 'goals';
            else if (txt.includes('future')) tileId = 'future';
            else if (txt.includes('environment')) tileId = 'environment';
            else if (txt.includes('street')) tileId = 'street';
            else if (txt.includes('thank')) tileId = 'thankyou';
            else tileId = 'about';
        }
        const x = e.clientX, y = e.clientY;
        createPinkParticle(x, y);
        animateTile(tile);
        updateToast(tileId);
        showZoomModal(tileId);
    }

    // reset button logic
    const resetBtn = document.getElementById('resetBtnPink');
    if(resetBtn) {
        resetBtn.addEventListener('click', () => {
            closeZoomModal();
            const toastDiv = document.getElementById('toastMsg');
            toastDiv.innerHTML = "🌸 RESET AURA — fresh pink energy! Click any tile to reveal hidden content 🌸";
            toastDiv.classList.add('glitch-click');
            setTimeout(() => toastDiv.classList.remove('glitch-click'), 500);
            for(let i=0;i<12;i++) {
                setTimeout(() => {
                    const randX = Math.random() * window.innerWidth;
                    const randY = Math.random() * window.innerHeight;
                    createPinkParticle(randX, randY);
                }, i * 40);
            }
        });
    }

    const modalOverlay = document.getElementById('pinkModal');
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeZoomModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && activeModal) closeZoomModal();
    });

    const streetTileForFlash = document.querySelector('[data-id="street"]');
    if(streetTileForFlash) {
        streetTileForFlash.addEventListener('click', () => {
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = 0; flash.style.left = 0;
            flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = '#ffc0cb';
            flash.style.opacity = '0.25';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '10001';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 150);
        });
    }

    // HOMEPAGE TRANSITION LOGIC
    const homepageDiv = document.getElementById('homepageContainer');
    const mainSiteDiv = document.getElementById('mainSite');
    const enterBtn = document.getElementById('enterSiteBtn');

    function transitionToMain() {
        if (!homepageDiv || !mainSiteDiv) return;
        homepageDiv.classList.add('fade-out');
        setTimeout(() => {
            homepageDiv.style.display = 'none';
            mainSiteDiv.classList.add('visible');
            document.body.style.overflow = 'auto';
            // bind tile events after dashboard is visible
            bindTileEvents();
            // tiny confetti aura after entering
            for(let i=0;i<18;i++) {
                setTimeout(() => {
                    const randX = Math.random() * window.innerWidth;
                    const randY = Math.random() * window.innerHeight;
                    createPinkParticle(randX, randY);
                }, i * 60);
            }
        }, 1000);
    }

    enterBtn.addEventListener('click', transitionToMain);

    // If someone accidentally tries to interact with tiles before homepage fades, no events yet, but we bind after
    // initially tiles won't be clickable because homepage overlay covers fullscreen with high z-index, safe!
    // Also add safety: if any tile gets clicked while homepage active, preventDefault style.
    document.querySelectorAll('.pink-tile').forEach(t => {
        t.style.pointerEvents = 'none';
    });
    // after transition re-enable manually
    const observer = new MutationObserver((mutations) => {
        if (mainSiteDiv.classList.contains('visible')) {
            document.querySelectorAll('.pink-tile').forEach(t => t.style.pointerEvents = 'auto');
            observer.disconnect();
        }
    });
    observer.observe(mainSiteDiv, { attributes: true, attributeFilter: ['class'] });
    
    console.log("💖 Homepage added! Welcome to Alay's enchanted space. Click Enter to explore.");
</script>
</body>
